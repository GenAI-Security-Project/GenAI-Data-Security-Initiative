  - id: P08.4
    control: DSGAI08
    name: eu-ai-act-annotation
    classification: structural
    signal: info
    confidence: low
    pcre: '(ai_act_risk_level|high_risk_ai|limited_risk|minimal_risk)'
    file_globs: ['*.md', '*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', 'docs/**', 'appsec/**', 'security-review/**']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'EU AI Act annotation'
  - id: P08.5
    control: DSGAI08
    name: audit-logging
    classification: structural
    signal: info
    confidence: low
    pcre: '(audit_log|decision_log|audit_trail)'
    file_globs: ['*.md', '*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', 'docs/**', 'appsec/**', 'security-review/**']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Audit logging'
  - id: P08.6
    control: DSGAI08
    name: do-not-track-honored
    classification: structural
    signal: info
    confidence: low
    pcre: '(do_not_track|opt_out|DNT)'
    file_globs: ['*.md', '*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', 'docs/**', 'appsec/**', 'security-review/**']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Do-not-track honored'
  - id: P09.1
    control: DSGAI09
    name: exif-metadata-strip
    classification: structural
