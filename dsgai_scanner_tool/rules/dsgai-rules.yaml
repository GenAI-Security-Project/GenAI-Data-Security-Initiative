# DSGAI scanner detection rules — source of truth.
# Generated once from dsgai_scanner_tool.md Step 2 by build/generate_rules.py,
# then hand-maintained. Validated by rules/rules.schema.json (see rules/README.md).
ruleset_version: '0.3.0'
framework: 'dsgai-2026-v1.0'
rules:
  - id: P01.1
    control: DSGAI01
    name: pii-scrubbing-imports
    classification: structural
    signal: info
    confidence: low
    pcre: '(anonymize|redact|scrub_pii|piiDetect|mask_pii|presidio)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'PII scrubbing imports'
  - id: P01.2
    control: DSGAI01
    name: no-train-flags
    classification: structural
    signal: info
    confidence: low
    pcre: '(allow_training|training_opt_out|X-Training-Data|no_train)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'No-train flags'
  - id: P01.3
    control: DSGAI01
    name: output-pii-filter
    classification: structural
    signal: info
    confidence: low
    pcre: '(filter_pii|remove_pii|output_sanitize|output_filter)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Output PII filter'
  - id: P01.4
    control: DSGAI01
    name: differential-privacy-lib
    classification: structural
    signal: info
    confidence: low
    pcre: '(opacus|tensorflow\.privacy|dp-accounting|differential\.privacy)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Differential privacy lib'
  - id: P01.5
    control: DSGAI01
    name: consent-gdpr-check
    classification: structural
    signal: info
    confidence: low
    pcre: '(consent_capture|gdpr|ccpa|data_subject|lawful_basis)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Consent / GDPR check'
  - id: P02.1
    control: DSGAI02
    name: hardcoded-llm-api-key
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '(?i)(OPENAI_API_KEY|openai[._-]?api[._-]?key)\s*[:=]\s*["'']?sk-[A-Za-z0-9_\-]{20,}'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hardcoded LLM API key (OpenAI)'
  - id: P02.2
    control: DSGAI02
    name: hardcoded-llm-api-key
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '(?i)(ANTHROPIC_API_KEY|anthropic[._-]?api[._-]?key)\s*[:=]\s*["'']?sk-ant-[A-Za-z0-9_\-]{20,}'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hardcoded LLM API key (Anthropic)'
  - id: P02.3
    control: DSGAI02
    name: hardcoded-cohere-google-hf-tokens
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '(?i)(COHERE_API_KEY|GOOGLE_API_KEY|HF_TOKEN|HUGGINGFACE_TOKEN)\s*[:=]\s*["'']?[A-Za-z0-9_\-]{20,}'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hardcoded Cohere/Google/HF tokens'
  - id: P02.4
    control: DSGAI02
    name: hardcoded-aws-creds
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '(AWS_ACCESS_KEY_ID|aws_access_key_id)\s*[:=]\s*["'']?[A-Z0-9]{16,}'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hardcoded AWS creds'
  - id: P02.5
    control: DSGAI02
    name: hardcoded-azure-gcp-cred
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '(AZURE_OPENAI_KEY|GCP_SERVICE_ACCOUNT_KEY)\s*[:=]\s*["'']?[A-Za-z0-9_\-]{16,}'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hardcoded Azure/GCP cred'
  - id: P02.6
    control: DSGAI02
    name: wildcard-token-scope
    classification: value_bearing
    signal: warn
    confidence: low
    pcre: '("scope"\s*:\s*"\*|permissions[^\n]{0,30}\*|scope[^\n]{0,20}admin)'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Wildcard token scope (warn)'
  - id: P02.7
    control: DSGAI02
    name: vault-secrets-manager
    classification: value_bearing
    signal: pass_signal
    confidence: medium
    pcre: '(hvac\.Client|hashicorp/vault|VAULT_(ADDR|TOKEN|NAMESPACE)|secretsmanager\.|GetSecretValue|SecretManagerServiceClient|azure[._-]keyvault|@aws-sdk/client-secrets-manager)'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Vault/secrets-manager (PASS)'
  - id: P02.8
    control: DSGAI02
    name: tool-call-signing
    classification: value_bearing
    signal: pass_signal
    confidence: medium
    pcre: '(hmac|sign_request|verify_signature|tool_auth|mtls|mutual_tls)'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Tool-call signing (PASS)'
  - id: P02.9
    control: DSGAI02
    name: raw-token-literal
    classification: value_bearing
    signal: fail
    confidence: high
    pcre: '\b(sk-ant-[A-Za-z0-9_\-]{20,}|sk-proj-[A-Za-z0-9_\-]{20,}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,}|xox[baprs]-[A-Za-z0-9-]{10,}|AIza[0-9A-Za-z_\-]{35}|AKIA[0-9A-Z]{16}|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})\b'
    file_globs: ['*.py', '*.ts', '*.js', '*.java', '*.kt', '*.go', '*.env*', '*.yaml', '*.yml', '*.json', '*.toml', '*.cfg']
    exclude_globs: ['*.min.js', 'dist/**', '**/__snapshots__/**', '*.lock', '*.map']
    framework: 'dsgai-2026-v1.0'
    description: 'Raw token literal (Slack/GitHub/Google/AWS/Anthropic/OpenAI/JWT) assigned to any variable'
    notes: 'JWT branch is noisy in bundles/lockfiles (see exclude_globs); further split tracked as a good-first-issue.'
  - id: P03.1
    control: DSGAI03
    name: third-party-llm-endpoints
    classification: structural
    signal: info
    confidence: low
    pcre: '(api\.openai\.com|api\.anthropic\.com|generativelanguage\.googleapis\.com|api\.cohere\.com|api\.together\.xyz|api\.mistral\.ai|api\.groq\.com)'
    file_globs: ['*.py', '*.ts', '*.java', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Third-party LLM endpoints'
  - id: P03.2
    control: DSGAI03
    name: internal-llm-gateway
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(llm[._-]?gateway|ai[._-]?proxy|model[._-]?gateway|llm[._-]?proxy)'
    file_globs: ['*.py', '*.ts', '*.java', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Internal LLM gateway (PASS)'
  - id: P03.3
    control: DSGAI03
    name: dlp-classification-check
    classification: structural
    signal: info
    confidence: low
    pcre: '(dlp|data_classification|classify_data|sensitivity_check)'
    file_globs: ['*.py', '*.ts', '*.java', '*.go', '*.yaml', '*.json', '*.env*']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'DLP / classification check'
  - id: P04.1
    control: DSGAI04
    name: unsafe-pickle
    classification: structural
    signal: fail
    confidence: medium
    pcre: 'torch\.load\s*\('
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Unsafe pickle (FAIL)'
    subtract: ['P04.2']
  - id: P04.2
    control: DSGAI04
    name: safe-pickle
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: 'torch\.load\s*\([^)]*weights_only\s*=\s*True'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Safe pickle (PASS counter)'
  - id: P04.3
    control: DSGAI04
    name: artifact-verification
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(sha256|verify_signature|model_hash|check_integrity)'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Artifact verification (PASS)'
  - id: P04.4
    control: DSGAI04
    name: unpinned-ml-deps
    classification: structural
    signal: warn
    confidence: low
    pcre: '^(torch|transformers|tensorflow|langchain|openai|anthropic|llama-index)\s*(>=|~=|\^|>|<|<=|\*|latest)'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Unpinned ML deps (WARN)'
  - id: P04.5
    control: DSGAI04
    name: sbom-in-ci
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(syft|cyclonedx|spdx|sbom)'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'SBOM in CI (PASS)'
  - id: P04.6
    control: DSGAI04
    name: trusted-registry
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(index-url|extra-index-url|artifactory|jfrog|verdaccio)'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Trusted registry (PASS)'
  - id: P04.7
    control: DSGAI04
    name: hash-pinned-install
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(--require-hashes|integrity\s*:\s*sha)'
    file_globs: ['*.py', '*.sh', '*.yml', '*.yaml', 'Dockerfile', 'requirements*.txt', 'pyproject.toml', 'setup.py']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Hash-pinned install (PASS)'
  - id: P05.1
    control: DSGAI05
    name: document-ingestion-calls
    classification: structural
    signal: info
    confidence: low
    pcre: '(loader\.load\(|ingest_document\(|add_documents\(|index_document\(|UnstructuredFileLoader|PyPDFLoader|DirectoryLoader)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Document ingestion calls'
    requires_nearby: {rules: ['P05.2', 'P05.3'], scope: module}
  - id: P05.2
    control: DSGAI05
    name: access-control
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(acl_filter|access_check|permitted_docs|filter\s*=.*tenant|namespace\s*=.*tenant)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Access control (PASS)'
  - id: P05.3
    control: DSGAI05
    name: tenant-filter-on-search
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(similarity_search|vector_search)[^)]{0,100}(filter|namespace|where)[^)]{0,40}tenant'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Tenant filter on search (PASS)'
  - id: P05.4
    control: DSGAI05
    name: integrity-check-on-docs
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(hashlib|sha256[^\n]{0,40}doc|integrity[._-]check|verify[._-]document)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Integrity check on docs (PASS)'
  - id: P05.5
    control: DSGAI05
    name: chunk-size-limits
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(max_chunk_size|chunk_size\s*=|max_doc_size|content_limit)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Chunk size limits (PASS)'
  - id: P05.6
    control: DSGAI05
    name: path-traversal-risk
    classification: structural
    signal: info
    confidence: low
    pcre: '(open\(.*\.\.|os\.path\.join\(.*request\.|Path\(.*request\.)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Path traversal risk'
  - id: P06.1
    control: DSGAI06
    name: insecure-mcp-transport
    classification: structural
    signal: fail
    confidence: medium
    pcre: '("url"\s*:\s*"http://|transport[^\n]{0,20}http://|"command"[^}]{0,200}--http(?!s))'
    file_globs: ['*.json', '*.yaml', '*.toml', '*.py', '*.ts', 'mcp.json', 'claude_desktop_config.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Insecure MCP transport (FAIL)'
  - id: P06.2
    control: DSGAI06
    name: mcp-auth
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(mcp[^\n]{0,30}(api_key|auth|bearer)|x-api-key[^\n]{0,20}mcp)'
    file_globs: ['*.json', '*.yaml', '*.toml', '*.py', '*.ts', 'mcp.json', 'claude_desktop_config.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'MCP auth (PASS)'
  - id: P06.3
    control: DSGAI06
    name: tool-schema-validation
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(jsonschema|pydantic[^\n]{0,30}validate|zod|schema[^\n]{0,20}tool|input_schema)'
    file_globs: ['*.json', '*.yaml', '*.toml', '*.py', '*.ts', 'mcp.json', 'claude_desktop_config.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Tool schema validation (PASS)'
  - id: P06.4
    control: DSGAI06
    name: wildcard-tool-perms
    classification: structural
    signal: warn
    confidence: low
    pcre: '(tools\s*[:=]\s*\*|"tools"\s*:\s*"\*"|allow_all_tools)'
    file_globs: ['*.json', '*.yaml', '*.toml', '*.py', '*.ts', 'mcp.json', 'claude_desktop_config.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Wildcard tool perms (WARN)'
  - id: P06.5
    control: DSGAI06
    name: uvicorn-bind-all-no-auth
    classification: structural
    signal: info
    confidence: low
    pcre: 'uvicorn\.run\([^)]*host\s*=\s*["'']0\.0\.0\.0'
    file_globs: ['*.json', '*.yaml', '*.toml', '*.py', '*.ts', 'mcp.json', 'claude_desktop_config.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'uvicorn bind-all + no auth'
    requires_nearby: {rule: P06.2, scope: module, absent: true}
  - id: P07.1
    control: DSGAI07
    name: ttl-config
    classification: structural
    signal: info
    confidence: low
    pcre: '(ttl\s*=|expires_in\s*=|max_age\s*=|RETENTION_DAYS|DATA_TTL|HISTORY_TTL)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'TTL config'
    notes: 'Absence of P07.1-P07.4 in a multi-tenant or PII-handling repo = WARN.'
  - id: P07.2
    control: DSGAI07
    name: session-cleanup
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(delete_session|clear_history|purge_conversation|clear_memory|delete_conversation)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Session cleanup (PASS)'
  - id: P07.3
    control: DSGAI07
    name: vector-delete
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(delete_namespace|delete_collection|drop_index|delete_index|reset_collection)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Vector delete (PASS)'
  - id: P07.4
    control: DSGAI07
    name: right-to-erasure
    classification: structural
    signal: pass_signal
    confidence: medium
    pcre: '(gdpr_delete|erase_user_data|handle_deletion|right_to_erasure|forget_user)'
    file_globs: ['*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'Right-to-erasure (PASS)'
  - id: P08.1
    control: DSGAI08
    name: dpia-privacy-assessment-doc
    classification: structural
    signal: info
    confidence: low
    pcre: '(DPIA|PIA|privacy_assessment|privacy[._-]impact)'
    file_globs: ['*.md', '*.py', '*.ts', '*.java', '*.kt', '*.go', '*.yaml', '*.json', 'docs/**', 'appsec/**', 'security-review/**']
    exclude_globs: []
    framework: 'dsgai-2026-v1.0'
    description: 'DPIA / privacy assessment doc'
    notes: 'Absence of P08.1-P08.6 in a production GenAI service = WARN; absence in a high-risk EU AI Act use case = FAIL.'
  - id: P08.2
    control: DSGAI08
    name: data-processing-agreement-ref
    classification: structural
    signal: info
    confidence: low
    pcre: '(data_processing_agreement|DPA|sub_processor)'
